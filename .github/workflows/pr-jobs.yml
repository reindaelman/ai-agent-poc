# Minimal pr-jobs workflow to mirror facebook/rocksdb/pr-jobs.
# Triggers on pull_request (including forks) and runs basic checks.
# On completion, workflow_run fires for claude-review / codex-review.

name: facebook/rocksdb/pr-jobs

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run checks
        run: |
          echo "PR checks passed"
          echo "Head SHA: ${{ github.event.pull_request.head.sha }}"
          echo "Base SHA: ${{ github.event.pull_request.base.sha }}"
          echo "Head repo: ${{ github.event.pull_request.head.repo.full_name }}"
