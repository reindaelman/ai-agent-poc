# Mirrors cloudflare/agents/.github/workflows/bonk.yml
# Skips ask-bonk/ask-bonk/github@main (OIDC rejects non-allowed orgs)
# and runs OpenCode directly — same as what the action does under the hood.
#
# The vulnerability: actions/checkout on pull_request_review_comment
# checks out refs/pull/<N>/merge, which includes fork code.
# OpenCode reads .opencode/opencode.jsonc from the workspace at startup,
# initializing MCP servers BEFORE any prompt processing.

name: Bonk

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  bonk:
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: false
    permissions:
      id-token: write
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -- Replaces ask-bonk/ask-bonk/github@main --
      # Can't use the real action (OIDC rejects non-allowed orgs).
      # These steps replicate the install + run portion.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install OpenCode
        run: |
          bun install -g opencode-ai@latest
          echo "opencode version: $(opencode version 2>/dev/null || echo 'unknown')"

      - name: Run OpenCode
        run: |
          echo "=== workspace config ==="
          cat .opencode/opencode.jsonc 2>/dev/null || echo "no config found"
          echo ""
          echo "=== starting opencode ==="
          echo "$PROMPT" | timeout 2m opencode run 2>&1 || true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROMPT: ${{ github.event.comment.body }}
